name: Prepare v0.1.1

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'agent/prepare-v0.1.1'
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate synchronized release changes
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const version = '0.1.1';
          const previousVersion = '0.1.0';

          const read = (file) => fs.readFileSync(file, 'utf8');
          const write = (file, content) => {
            fs.writeFileSync(file, content.endsWith('\n') ? content : `${content}\n`);
          };
          const updateJson = (file, mutate) => {
            const value = JSON.parse(read(file));
            mutate(value);
            write(file, `${JSON.stringify(value, null, 2)}\n`);
          };
          const replaceRequired = (file, from, to) => {
            const input = read(file);
            if (!input.includes(from)) {
              if (input.includes(to)) return;
              throw new Error(`Expected text not found in ${file}: ${from}`);
            }
            write(file, input.replace(from, to));
          };

          updateJson('package.json', (pkg) => {
            pkg.version = version;
          });
          updateJson('package-lock.json', (lock) => {
            lock.version = version;
            lock.packages[''].version = version;
          });
          updateJson('.claude-plugin/marketplace.json', (manifest) => {
            manifest.version = version;
            manifest.plugins[0].version = version;
          });
          updateJson('.claude-plugin/plugin.json', (manifest) => {
            manifest.version = version;
          });
          updateJson('.codex-plugin/plugin.json', (manifest) => {
            manifest.version = version;
          });
          updateJson('gemini-extension.json', (manifest) => {
            manifest.version = version;
          });

          replaceRequired(
            'README.md',
            `[![Version](https://img.shields.io/badge/version-${previousVersion}-blue.svg)](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${previousVersion})`,
            `[![Version](https://img.shields.io/badge/version-${version}-blue.svg)](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${version})`,
          );
          replaceRequired(
            'README.md',
            `· [Release](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${previousVersion}) ·`,
            `· [Release](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${version}) ·`,
          );
          replaceRequired(
            'README.md',
            `> **Public release:** ADHDMode \`v${previousVersion}\` is available from the [GitHub Releases page](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${previousVersion}). The repository is public and the remote installation commands below are ready to use.`,
            `> **Public release:** ADHDMode \`v${version}\` is available from the [GitHub Releases page](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/releases/tag/v${version}). The repository is public and the remote installation commands below are ready to use.`,
          );
          replaceRequired(
            'README.md',
            `- [v${previousVersion} release notes](docs/release-notes-v${previousVersion}.md)`,
            `- [v${version} release notes](docs/release-notes-v${version}.md)\n- [v${previousVersion} release notes](docs/release-notes-v${previousVersion}.md)`,
          );
          replaceRequired(
            'README.md',
            `\`v${previousVersion}\` is the initial production-ready release and is now publicly available. The policy, modes, profiles, configuration CLI, multi-agent adapters, evaluation cases, package checks, and guarded release process are complete.`,
            `\`v${version}\` is the current maintenance release. It adds clean-install verification, contributor templates, five-minute onboarding, mode examples, and current Codex Mentions V2 guidance without changing the canonical ADHDMode response policy.`,
          );

          replaceRequired(
            'docs/install.md',
            `> **Public release:** ADHDMode \`v${previousVersion}\` is publicly available. The remote installation commands below can be used without private repository access.`,
            `> **Public release:** ADHDMode \`v${version}\` is publicly available. The remote installation commands below can be used without private repository access.`,
          );

          const changelogHeading = '# Changelog\n\n';
          const changelogEntry = `## ${version}\n\n- Added a deterministic clean-install verifier with human-readable and JSON output.\n- Added real-agent verification guidance and evidence-based tracking.\n- Added structured bug, feature, verification, and pull-request templates.\n- Added a five-minute quick start and examples for all response modes.\n- Updated Codex guidance for stable Mentions V2 with \`@adhd-mode\` as the default and \`$adhd-mode\` as the compatibility fallback.\n- Strengthened version and installation contracts without changing the canonical ADHDMode response policy.\n\n`;
          const changelog = read('CHANGELOG.md');
          if (!changelog.includes(`## ${version}\n`)) {
            if (!changelog.startsWith(changelogHeading)) {
              throw new Error('Unexpected CHANGELOG.md heading.');
            }
            write('CHANGELOG.md', changelog.replace(changelogHeading, `${changelogHeading}${changelogEntry}`));
          }

          write(
            `docs/release-notes-v${version}.md`,
            `# ADHDMode v${version}\n\nADHDMode v${version} is a maintenance release focused on installation confidence, contributor readiness, onboarding, and current agent compatibility. It does not change the canonical ADHDMode response policy.\n\n## Highlights\n\n- Added \`npm run verify:install\` for deterministic clean-install validation across supported skill layouts.\n- Added machine-readable installation verification with \`node scripts/verify-install.mjs --json\`.\n- Added structured GitHub issue forms and a pull-request template for actionable contributions.\n- Added a five-minute quick start, troubleshooting guidance, and examples for all seven response modes.\n- Added a real-agent verification matrix that separates repository checks from genuine application launches.\n- Updated OpenAI Codex guidance for stable Mentions V2: use \`@adhd-mode\` by default, with \`$adhd-mode\` retained as a legacy-compatible fallback.\n\n## Compatibility and behavior\n\n- The canonical skill remains at \`skills/adhd-mode/SKILL.md\`.\n- Claude Code, Codex, Gemini CLI, GitHub Copilot, Cursor, and generic Agent Skills packaging remain supported.\n- No automatic release workflow is added to \`main\`.\n- No real proprietary-agent launch is claimed by deterministic repository tests. Real launch evidence remains tracked in issue #12.\n\n## Validation\n\nThe release preparation is validated on Node.js 20 and Node.js 22 with:\n\n- \`npm ci\`\n- complete \`npm test\`\n- clean-install and version-contract tests\n- \`npm run pack:check\`\n`,
          );

          const installContracts = read('tests/install-contracts.test.mjs');
          const oldBlock = `test('Claude marketplace and plugin use current install contracts', () => {\n  const marketplace = readJson('.claude-plugin/marketplace.json');\n  const plugin = readJson('.claude-plugin/plugin.json');\n\n  assert.equal(marketplace.$schema, 'https://json.schemastore.org/claude-code-marketplace.json');\n  assert.equal(marketplace.version, '0.1.0');\n  assert.equal(marketplace.plugins[0].source, './');\n  assert.equal(plugin.$schema, 'https://json.schemastore.org/claude-code-plugin-manifest.json');\n  assert.equal(plugin.displayName, 'ADHDMode');\n  assert.equal(plugin.hooks, './claude-hooks/hooks.json');\n});`;
          const newBlock = `test('distribution manifests use the current package version and install contracts', () => {\n  const pkg = readJson('package.json');\n  const lock = readJson('package-lock.json');\n  const marketplace = readJson('.claude-plugin/marketplace.json');\n  const claudePlugin = readJson('.claude-plugin/plugin.json');\n  const codexPlugin = readJson('.codex-plugin/plugin.json');\n  const geminiExtension = readJson('gemini-extension.json');\n\n  assert.equal(lock.version, pkg.version);\n  assert.equal(lock.packages[''].version, pkg.version);\n  assert.equal(marketplace.$schema, 'https://json.schemastore.org/claude-code-marketplace.json');\n  assert.equal(marketplace.version, pkg.version);\n  assert.equal(marketplace.plugins[0].version, pkg.version);\n  assert.equal(marketplace.plugins[0].source, './');\n  assert.equal(claudePlugin.$schema, 'https://json.schemastore.org/claude-code-plugin-manifest.json');\n  assert.equal(claudePlugin.version, pkg.version);\n  assert.equal(claudePlugin.displayName, 'ADHDMode');\n  assert.equal(claudePlugin.hooks, './claude-hooks/hooks.json');\n  assert.equal(codexPlugin.version, pkg.version);\n  assert.equal(geminiExtension.version, pkg.version);\n  assert.ok(read('README.md').includes(\`/releases/tag/v\${pkg.version}\`));\n  assert.ok(read('CHANGELOG.md').includes(\`## \${pkg.version}\`));\n  assert.equal(fs.existsSync(path.join(root, \`docs/release-notes-v\${pkg.version}.md\`)), true);\n});`;
          if (!installContracts.includes(oldBlock)) {
            if (!installContracts.includes(newBlock)) {
              throw new Error('Expected install-contract test block was not found.');
            }
          } else {
            write('tests/install-contracts.test.mjs', installContracts.replace(oldBlock, newBlock));
          }
          NODE

      - name: Remove the one-time workflow before validation
        run: rm .github/workflows/prepare-v0.1.1.yml

      - name: Validate prepared release
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Commit prepared release
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi
          git commit -m "Prepare ADHDMode v0.1.1"
          git push origin "HEAD:${{ github.head_ref }}"
