name: Prepare Codex fallback evidence correction

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  prepare:
    if: github.head_ref == 'fix/codex-fallback-evidence'
    runs-on: ubuntu-latest
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Correct current Codex activation guidance
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              'README.md': [
                  (
                      'Claude Code activates the installed skill with `/adhd-mode:adhd-mode`. Codex confirms discovery with `/skills` and invokes it with `@adhd-mode`; `$adhd-mode` remains a legacy-compatible fallback. Other supported agents use the installation and discovery paths documented below.',
                      'Claude Code activates the installed skill with `/adhd-mode:adhd-mode`. Codex confirms discovery with `/skills` and invokes it with `@adhd-mode`. Authenticated `v0.1.1` testing did not show `SKILL.md` loading for `$adhd-mode`, so treat it as unverified legacy syntax rather than a supported fallback. Other supported agents use the installation and discovery paths documented below.'
                  ),
                  (
                      '| OpenAI Codex | Standard Agent Skill directory | `/skills`, then `@adhd-mode` (`$adhd-mode` fallback) |',
                      '| OpenAI Codex | Standard Agent Skill directory | `/skills`, then verified `@adhd-mode`; `$adhd-mode` is unverified legacy syntax |'
                  ),
                  (
                      'Codex still recognizes `$adhd-mode` through its legacy-compatible mention parser.',
                      'Codex source contains a legacy `$` mention parser, but authenticated `v0.1.1` testing did not produce observable `SKILL.md` loading for `$adhd-mode`. Use `@adhd-mode` as the verified activation path and track the legacy behavior in [issue #23](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/issues/23).'
                  ),
              ],
              'docs/install.md': [
                  (
                      'Codex still recognizes the legacy-compatible form:\n\n```text\n$adhd-mode\n```',
                      'A legacy `$` mention parser exists in Codex source, but authenticated `v0.1.1` testing did not show observable Agent Skill loading for:\n\n```text\n$adhd-mode\n```\n\nDo not treat this as a verified activation path. Use `@adhd-mode` until [issue #23](https://github.com/SUDARSHANCHAUDHARI/ADHDMode/issues/23) is resolved with real skill-load evidence.'
                  ),
              ],
              'docs/quickstart.md': [
                  (
                      'The legacy-compatible `$adhd-mode` form remains available in Codex.',
                      'Authenticated `v0.1.1` testing did not show `SKILL.md` loading for `$adhd-mode`. Treat it as unverified legacy syntax and use `@adhd-mode` as the verified activation path.'
                  ),
              ],
              'docs/agent-verification.md': [
                  (
                      '| OpenAI Codex | Copy to `.agents/skills/adhd-mode/` and restart | `/skills`, then `@adhd-mode`; retry `$adhd-mode` only as the legacy-compatible fallback | Not yet recorded |',
                      '| OpenAI Codex | Copy to `.agents/skills/adhd-mode/` and restart | `/skills`, then verified `@adhd-mode`; test `$adhd-mode` separately as unverified legacy syntax | Partially verified; see issue #12 |'
                  ),
              ],
              'tests/install-contracts.test.mjs': [
                  (
                      '  assert.match(readme, /legacy-compatible fallback/);',
                      '  assert.match(readme, /unverified legacy syntax/);\n  assert.doesNotMatch(readme, /legacy-compatible fallback/);'
                  ),
                  (
                      '  assert.match(install, /\\$adhd-mode/);',
                      '  assert.match(install, /\\$adhd-mode/);\n  assert.match(install, /Do not treat this as a verified activation path/);'
                  ),
              ],
              'tests/onboarding-docs.test.mjs': [
                  (
                      "    'legacy-compatible',",
                      "    'unverified legacy syntax',"
                  ),
              ],
          }

          for file_name, pairs in replacements.items():
              path = Path(file_name)
              text = path.read_text()
              for old, new in pairs:
                  if old not in text:
                      raise SystemExit(f'Expected text not found in {file_name}: {old[:80]}')
                  text = text.replace(old, new, 1)
              path.write_text(text)

          test_path = Path('tests/codex-activation-evidence.test.mjs')
          test_path.write_text("""import assert from 'node:assert/strict';
          import fs from 'node:fs';
          import path from 'node:path';
          import test from 'node:test';

          const root = process.cwd();
          const read = (file) => fs.readFileSync(path.join(root, file), 'utf8');

          test('Codex guidance distinguishes verified activation from legacy syntax', () => {
            const readme = read('README.md');
            const install = read('docs/install.md');
            const quickstart = read('docs/quickstart.md');
            const verification = read('docs/agent-verification.md');

            for (const document of [readme, install, quickstart, verification]) {
              assert.match(document, /@adhd-mode/);
              assert.match(document, /\\$adhd-mode/);
            }

            assert.match(readme, /unverified legacy syntax/);
            assert.match(readme, /observable `SKILL\\.md` loading/);
            assert.match(install, /Do not treat this as a verified activation path/);
            assert.match(quickstart, /use `@adhd-mode` as the verified activation path/);
            assert.match(verification, /test `\\$adhd-mode` separately as unverified legacy syntax/);
            assert.doesNotMatch(readme, /legacy-compatible fallback/);
            assert.doesNotMatch(quickstart, /form remains available in Codex/);
          });
          """)
          PY

      - name: Remove one-time workflow before validation
        run: rm .github/workflows/prepare-codex-fallback-fix.yml

      - name: Validate focused fix
        run: |
          npm ci
          npm test
          npm run pack:check

      - name: Commit prepared fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md docs/install.md docs/quickstart.md docs/agent-verification.md tests/install-contracts.test.mjs tests/onboarding-docs.test.mjs tests/codex-activation-evidence.test.mjs .github/workflows/prepare-codex-fallback-fix.yml
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Clarify verified Codex activation guidance'
          git push origin HEAD:${{ github.head_ref }}
